name: nesters
description: "A place for you to find your next home. 🏡"
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  bloc: ^8.1.4
  cached_network_image: ^3.3.1
  cloud_firestore: ^4.15.8
  cupertino_icons: ^1.0.2
  dash_chat_2: ^0.0.20
  dropdown_search: ^5.0.6
  equatable: ^2.0.5
  firebase_auth: ^4.17.8
  firebase_core: ^2.27.0
  firebase_crashlytics: ^3.4.18
  firebase_storage: ^11.6.9
  flutter_bloc: ^8.1.5
  flutter_cache_manager: ^3.3.1
  flutter_dotenv: ^5.1.0
  flutter_file_dialog: ^3.0.2
  flutter_image_compress: ^2.3.0
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  freezed_annotation: ^2.4.1
  get_it: ^7.6.7
  get_storage: ^2.1.1
  go_router: ^14.0.2
  google_sign_in: ^6.2.1
  http: ^1.2.0
  image_picker: ^1.0.8
  infinite_scroll_pagination: ^4.0.0
  logger: ^2.2.0
  path: ^1.8.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  supabase_flutter: ^2.5.2
  firebase_database: ^10.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  firebase_auth_platform_interface: ^7.0.5
  firebase_core_platform_interface: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/onboarding/
    - assets/images/user/
    - assets/images/user/profile/
    - assets/svg/
    - assets/lottie/
    - assets/fonts/
    # ENV File
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300 # Light weight
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400 # Regular weight
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600 # Semibold weight
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700 # Bold weight
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800 # Extra bold weight
