name: nesters
description: "A place for you to find your next roommate & home. 🏡"
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.3+4

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  bloc: ^8.1.4
  cached_network_image: ^3.3.1
  cloud_firestore: ^4.15.8
  connectivity_plus: ^6.0.3
  cupertino_icons: ^1.0.2
  dash_chat_2: ^0.0.20
  delightful_toast: ^1.1.0
  device_info_plus: ^9.1.2
  dotted_border: ^2.1.0
  dropdown_search: ^5.0.6
  equatable: ^2.0.5
  firebase_app_check: ^0.2.1+17
  firebase_auth: ^4.17.8
  firebase_core: ^2.27.0
  firebase_crashlytics: ^3.4.18
  firebase_database: ^10.4.9
  firebase_messaging: ^14.7.19
  firebase_storage: ^11.6.9
  flutter_bloc: ^8.1.5
  flutter_cache_manager: ^3.3.1
  flutter_dotenv: ^5.1.0
  # flutter_file_dialog: ^3.0.2
  flutter_image_compress: ^2.3.0
  flutter_local_notifications: ^17.1.2
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  get_it: ^7.6.7
  get_storage: ^2.1.1
  go_router: ^14.0.2
  google_sign_in: ^6.2.1
  http: ^1.2.0
  image_picker: ^1.0.8
  infinite_scroll_pagination: ^4.0.0
  intl: ^0.18.1
  objectbox: ^4.0.0
  objectbox_flutter_libs: any
  package_info_plus: ^5.0.1
  path: ^1.8.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  rxdart: ^0.27.7
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  socket_io_client: ^2.0.3+1
  supabase_flutter: ^2.5.2
  lottie: ^3.1.3
  # 6.3.1 not working for url_launcher
  url_launcher: 6.1.5
  url_launcher_ios: 6.1.5
  firebase_analytics: ^10.8.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  logger: ^2.4.0
  flutter_lints: ^2.0.0
  build_runner: ^2.4.9
  firebase_auth_platform_interface: ^7.0.5
  firebase_core_platform_interface: ^5.0.0
  objectbox_generator: any

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/onboarding/
    - assets/images/user/
    - assets/images/user/profile/
    - assets/svg/
    - assets/fonts/
    - assets/lottie/
    # ENV File
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300 # Light weight
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400 # Regular weight
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600 # Semibold weight
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700 # Bold weight
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800 # Extra bold weight
