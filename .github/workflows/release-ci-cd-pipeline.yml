name: Nesters Release Build Workflow

on:
  # push:
  #   branches:
  #     - prod
  workflow_dispatch:
      
permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.store_version.outputs.version }}
      version_code: ${{ steps.store_version.outputs.version_code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Store Version
        id: store_version
        run: |
          version=$(grep "version" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1 | tr -d '\r')
          version_code=$(grep "version" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f2 | tr -d '\r')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_code=$version_code" >> $GITHUB_OUTPUT

  android-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JAVA 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Object Box
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Setup Config
        run: |
          echo ${{ secrets.BASE64_ENCODE_GOOGLE_SERVICES }} | base64 -d > android/app/google-services.json
          echo ${{ secrets.BASE64_ENCODED_KEY_PROPERTIES }} | base64 -d > android/key.properties
          echo ${{ secrets.BASE64_ENCODED_KEYSTORE }} | base64 -d > keystores/release-keystore.jks
          echo ${{ secrets.ENCODED_ENV }} | base64 -d > .env

      - name: Build Nesters Release
        run: |
          echo "Building Nesters release - Version: ${{ needs.setup.outputs.version }}"
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nesters_v${{ needs.setup.outputs.version }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Cleanup Keystore
        if: ${{ always() }}
        run: |
          rm -f android/app/google-services.json
          rm -f android/key.properties
          rm -f keystores/release-keystore.jks

  ios-build:
    needs: setup
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Object Box
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Setup Config
        run: |
          echo ${{ secrets.BASE64_ENCODED_ENV }} | base64 -d > .env
          echo ${{ secrets.BASE64_GOOGLE_SERVICE_PLIST }} | base64 -d > ios/Runner/GoogleService-Info.plist

      - uses: cedvdb/action-flutter-build-ios@v1
        with:
          build-cmd: flutter build ipa --release --export-options-plist=ios/Runner/ExportOptions.plist
          certificate-base64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          certificate-password: ${{ secrets.IOS_BUILD_CERTIFICATE_PASSWORD }}
          provisioning-profile-base64: ${{ secrets.IOS_MOBILE_PROVISIONING_PROFILE_BASE64 }}
          keychain-password: ${{ secrets.IOS_GITHUB_KEYCHAIN_PASSWORD }}


      - name: Build IPA
        run: flutter build ipa --release --export-method=ad-hoc

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nesters_v${{ needs.setup.outputs.version }}.ipa
          path: build/ios/ipa/*.ipa

      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f ios/Runner/GoogleService-Info.plist
