name: Nesters Release Build Workflow

on:
  # push:
  #   branches:
  #     - prod
  workflow_dispatch:
      
permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.store_version.outputs.version }}
      version_code: ${{ steps.store_version.outputs.version_code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Store Version
        id: store_version
        run: |
          version=$(grep "version" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1 | tr -d '\r')
          version_code=$(grep "version" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f2 | tr -d '\r')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_code=$version_code" >> $GITHUB_OUTPUT

