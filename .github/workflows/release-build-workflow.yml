name: Nesters Release Build Workflow

on:
  push:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.store_version.outputs.version }}
      version_code: ${{ steps.store_version.outputs.version_code }}
      is_released: ${{ steps.check_release.outputs.is_released }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Store Version
        id: store_version
        run: |
          version=$(grep "version" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1 | tr -d '\r')
          version_code=$(grep "version" pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f2 | tr -d '\r')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_code=$version_code" >> $GITHUB_OUTPUT

      - name: Check if release version exists
        id: check_release
        run: |
          version=${{ steps.store_version.outputs.version }}
          git fetch --tags
          # check if the tag already exists in the repository and store the result in the output
          if git rev-parse $version >/dev/null 2>&1; then
            echo "is_released=true" >> $GITHUB_OUTPUT
          else
            echo "is_released=false" >> $GITHUB_OUTPUT
          fi

  android-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup JAVA 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          channel: "stable"
          cache: true

      - name: Get Flutter dependencies
        run: |
          flutter pub get

      - name: Cache Object Box
        uses: actions/cache@v4
        id: objectbox-cache
        with:
          path: ./lib/objectbox.g.dart
          key: ${{ runner.os }}-flutter-objectbox-${{ hashFiles('lib/objectbox-model.json') }}
          restore-keys: |
            ${{ runner.os }}-flutter-objectbox-

      - name: Build Object Box
        if: steps.objectbox-cache.outputs.cache-hit != 'true'
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Setup Config
        run: |
          echo ${{ secrets.BASE64_ENCODE_GOOGLE_SERVICES }} | base64 -d > android/app/google-services.json
          echo ${{ secrets.BASE64_ENCODED_KEY_PROPERTIES }} | base64 -d > android/key.properties
          echo ${{ secrets.BASE64_ENCODED_KEYSTORE }} | base64 -d > keystores/release-keystore.jks
          echo ${{ secrets.ENCODED_ENV }} | base64 -d > .env

      - name: Build Nesters Release
        run: |
          echo "Building Nesters release - Version: ${{ needs.setup.outputs.version }}"
          flutter build apk --release --verbose > build-android.log 2>&1

      - name: Upload build log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-android-log
          path: build-android.log

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nesters_v${{ needs.setup.outputs.version }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Cleanup Config
        if: ${{ always() }}
        run: |
          rm -f android/app/google-services.json
          rm -f android/key.properties
          rm -f keystores/release-keystore.jks
          rm -f .env

