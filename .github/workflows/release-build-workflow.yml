  release-distribute:
    # needs: [setup, android-build, ios-build]
    needs: [setup, android-build]
    runs-on: ubuntu-latest
    env:
      version: ${{ needs.setup.outputs.version }}
      version_code: ${{ needs.setup.outputs.version_code }}
      is_released: ${{ needs.setup.outputs.is_released }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: Nesters_v${{env.version}}.apk
          path: .

      - name: Unzip APK Artifact
        run: |
          ls
          unzip "*.zip"

      # - name: Download IPA Artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: Nesters_v${{env.version}}.ipa
      #     path: .

      - name: Verify Apps
        run: |
          echo "Verifying APK and IPA artifacts"
          ls -l Nesters_v${{ env.version }}.apk
          # ls -l Nesters_v${{ env.version }}.ipa

      - if: ${{ env.is_released == 'false' }}
        name: Create Release
        id: create_release
        uses: actions/create-release@v1
        continue-on-error: true
        with:
          tag_name: v${{ env.version }}-test
          release_name: Nesters v${{ env.version }}
          body: "Release version ${{ env.version }} of Nesters."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ env.is_released == 'false' && steps.create_release.outputs.id != '' }}
        name: Upload Release Apk
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Nesters_v${{ env.version }}.apk
          asset_name: Nesters_v${{ env.version }}+${{env.version_code}}.apk
          asset_content_type: application/vnd.android.package-archive

      # - if: ${{ env.is_released == 'false' && steps.create_release.outputs.id != '' }}
      #   name: Upload Release Ipa
      #   uses: actions/upload-release-asset@v1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   with:
      #     upload_url: ${{ steps.create_release.outputs.upload_url }}
      #     asset_path: ./Nesters_v${{ env.version }}.ipa
      #     asset_name: Nesters_v${{ env.version }}+${{env.version_code}}.ipa
      #     asset_content_type: application/octet-stream

      - name: Decode Service Account JSON
        run: |
          echo ${{ secrets.FIREBASE_SERVICE_CREDENTIAL_JSON_BASE64 }} | base64 -d > firebase-service-account.json

      - name: Distribute Release to Firebase Android Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFile: firebase-service-account.json
          groups: internal-testers
          releaseNotes: "Release version ${{ env.version }} of Nesters."
          file: ./Nesters_v${{ env.version }}.apk
          debug: false

      # - name: Distribute Release to Firebase iOS Distribution
      #   uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
      #   with:
      #     appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
      #     serviceCredentialsFile: firebase-service-account.json
      #     groups: internal-testers
      #     releaseNotes: "Release version ${{ env.version }} of Nesters."
      #     file: ./Nesters_v${{ env.version }}.ipa
      #     debug: false

      - name: Clean up artifacts
        if: ${{ always() }}
        run: |
          rm -f Nesters_v${{ env.version }}.apk
          rm -f Nesters_v${{ env.version }}.ipa
          rm -f firebase-service-account.json
