plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def googleMapsProperties = new Properties()
def googleMapsPropertiesFile = rootProject.file('google-maps.properties')
if (googleMapsPropertiesFile.exists()) {
    googleMapsProperties.load(new FileInputStream(googleMapsPropertiesFile))
} else {
    throw new GradleException("google-maps.properties file not found - please create one in the root directory of the android project")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.app.nesters"
    compileSdkVersion 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.app.nesters"
        minSdkVersion 21
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            keyAlias 'DebugNesters'
            keyPassword 'debug-nesters'
            storePassword 'debug-nesters'
            storeFile file('../../keystores/debug-keystore.jks')
        }
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storePassword keystoreProperties['storePassword']
            storeFile file(keystoreProperties['storeFile'])
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            manifestPlaceholders["crashlyticsCollectionEnabled"] = true
            manifestPlaceholders['googleMapsApiKey'] = googleMapsProperties['GOOGLE_MAPS_RELEASE_API_KEY']
        }
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders["crashlyticsCollectionEnabled"] = false
            manifestPlaceholders['googleMapsApiKey'] = googleMapsProperties['GOOGLE_MAPS_DEBUG_API_KEY']
        }
    }

}

flutter {
    source '../..'
}

dependencies {

    // ===================== Firebase =====================
    def firebase_version = "32.8.1"
    implementation platform('com.google.firebase:firebase-bom:$firebase_version')
    implementation 'com.google.firebase:firebase-analytics'
}